<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
body { font-family: Arial; text-align:center; }
canvas { border:1px solid black; cursor: crosshair; }
input { width:60px; margin:5px; }
</style>
</head>
<body>
    <h2>Recorte de Líneas - Cohen Sutherland</h2>

    <h4>Viewport</h4>
    xmin: <input id="xmin" type="number" value="150">
    xmax: <input id="xmax" type="number" value="350">
    ymin: <input id="ymin" type="number" value="100">
    ymax: <input id="ymax" type="number" value="250">
    <button onclick="actualizarViewport()">Actualizar</button>

    x1: <input id="x1">
    y1: <input id="y1">
    x2: <input id="x2">
    y2: <input id="y2">
    <button onclick="dibujarManual()">Dibujar</button>

    <canvas id="canvas" width="500" height="350"></canvas>
<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let xmin = 150, xmax = 350;
let ymin = 100, ymax = 250;

const INSIDE = 0;
const LEFT = 1;
const RIGHT = 2;
const BOTTOM = 4;
const TOP = 8;


function calcularCodigo(x, y) {
    let c = 0; 

    if (x <= xmin) c = c | LEFT;   
    else if (x > xmax) c = RIGHT;  

    if (y < ymin) c |= BOTTOM;
    else if (y >= ymax) c = c | TOP; 

    return codigo; 
}

function cohenSutherland(x1, y1, x2, y2) {
    let c1 = calcularCodigo(x1, y1);
    let c2 = calcularCodigo(x2, y2);

    while(true){
        if ((c1 | c2) === 0) {
            return [x1, y1, x2, y2];
        } else if ((c1 & c2) !== 0) {
            return null;
        } else {
            let x, y;
            let fuera = c1 !== 0 ? c1 : c2;

            if (fuera & TOP) {
                x = x1 + (x2 - x1) * (ymax - y1) / (y2 - y1);
                y = ymax;
            } else if (fuera & BOTTOM) {
                x = x1 + (x2 - x1) * (ymin - y1) / (y2 - y1);
                y = ymin;
            } 

            

    }

}
</script>
</body>
</html>
